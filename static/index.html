<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kendrick Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #4235d7;
      --green-dim:    #1a2a6b;
      --green-glow:   rgba(57, 119, 211, 0.15);
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface-2:    #1a1a1a;
      --bubble-bot:   #111811;
      --bubble-user:  #0b2214;
      --text:         #c9d1c9;
      --text-bright:  #e8f5e8;
      --text-muted:   #9daace;
      --border:       #1f2e1f;
      --radius:       4px;
      --font:         'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 760px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--green-dim);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header-sigil {
      font-size: 18px;
      color: var(--green);
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1;
    }

    #header-text { flex: 1; }

    #header-title {
      color: var(--green);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    #header-subtitle {
      color: var(--text-muted);
      font-size: 11px;
    }

    #header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--green-dim); }
    #messages::-webkit-scrollbar-track { background: transparent; }

    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 90%;
    }

    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.bot  { align-self: flex-start; }

    .avatar {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding-top: 10px;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .avatar.bot  { color: var(--green); }
    .avatar.user { color: var(--text-muted); }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bubble.bot {
      background: var(--bubble-bot);
      color: var(--text-bright);
      border: 1px solid var(--border);
      border-left: 2px solid var(--green-dim);
    }

    .bubble.user {
      background: var(--bubble-user);
      color: var(--text-bright);
      border: 1px solid var(--border);
      border-right: 2px solid var(--green-dim);
    }

    .bubble.error {
      background: #1a0a0a;
      color: #ff5555;
      border: 1px solid #3d1111;
      border-left: 2px solid #ff5555;
    }

    /* Thinking indicator */
    .thinking-label {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .thinking-cursor {
      display: inline-block;
      width: 8px;
      height: 13px;
      background: var(--green);
      margin-left: 3px;
      vertical-align: middle;
      animation: cursor-blink 0.9s step-end infinite;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Input bar ── */
    #input-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 14px;
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    #input-prompt {
      flex-shrink: 0;
      color: var(--green);
      font-size: 14px;
      font-weight: 600;
      padding-bottom: 8px;
      user-select: none;
    }

    #input-wrap {
      flex: 1;
      position: relative;
    }

    #user-input {
      width: 100%;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px 22px;
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-bright);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      max-height: 110px;
      overflow-y: auto;
      caret-color: var(--green);
    }

    #user-input:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 0 2px var(--green-glow);
    }

    #user-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #char-counter {
      position: absolute;
      bottom: 5px;
      right: 8px;
      font-size: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #char-counter.warn  { color: #e6b800; }
    #char-counter.limit { color: #ff5555; }

    #send-btn {
      flex-shrink: 0;
      height: 34px;
      padding: 0 14px;
      border: 1px solid var(--green-dim);
      border-radius: var(--radius);
      background: transparent;
      color: var(--green);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--green-glow);
      box-shadow: 0 0 8px var(--green-glow);
    }

    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Session footer — counter + ended banner */
    #session-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 2px 1px;
      min-height: 20px;
    }

    #session-counter {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    #session-counter.warn  { color: #e6b800; }
    #session-counter.limit { color: #ff5555; }

    #session-banner {
      display: none;
      font-size: 10px;
      color: #ff5555;
      letter-spacing: 0.04em;
    }

    /* Clear button */
    #clear-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--green-dim);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #clear-btn:hover { color: var(--green); border-color: var(--green); }

    /* Prompt chips */
    #prompt-chips {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-self: flex-start;
      max-width: 90%;
      margin-top: 2px;
    }

    .prompt-chip {
      background: transparent;
      border: 1px solid var(--border);
      border-left: 2px solid var(--green-dim);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      text-align: left;
      padding: 7px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .prompt-chip::before {
      content: '$ ';
      color: var(--green-dim);
    }

    .prompt-chip:hover {
      color: var(--text-bright);
      border-color: var(--green-dim);
      border-left-color: var(--green);
      background: var(--green-glow);
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-sigil">&gt;_</div>
    <div id="header-text">
      <div id="header-title">KENDRICK.BOT</div>
      <div id="header-subtitle">// Kendrick's Professional AI Agent</div>
    </div>
    <div id="header-status">
      <div id="status-dot"></div>
      ONLINE
    </div>
    <button id="clear-btn" title="Clear chat">[ CLR ]</button>
  </div>

  <div id="messages" role="log" aria-live="polite" aria-label="Conversation"></div>

  <div id="input-bar">
    <div id="input-row">
      <div id="input-prompt">&gt;</div>
      <div id="input-wrap">
        <textarea
          id="user-input"
          rows="1"
          placeholder="type a question…"
          maxlength="500"
          aria-label="Your message"
        ></textarea>
        <span id="char-counter">0 / 500</span>
      </div>
      <button id="send-btn" aria-label="Send message" title="Send (Enter)">
        SEND
      </button>
    </div>
    <div id="session-footer">
      <span id="session-counter">// queries: 0 / 5</span>
      <span id="session-banner">session limit reached</span>
    </div>
  </div>

</div>

<script>
  const MAX_CHARS = 500;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const counterEl  = document.getElementById('char-counter');
  const bannerEl   = document.getElementById('session-banner');
  const sessionCounterEl = document.getElementById('session-counter');
  const clearBtn   = document.getElementById('clear-btn');

  const SESSION_LIMIT = 5;
  let history      = [];
  let isStreaming  = false;
  let sessionEnded = false;
  let turnCount    = 0;

  const PROMPTS = [
    "Tell me more about Kendrick's career growth and development",
    "Tell me more about Kendrick's opinion on Agentic AI solution",
    "How does Kendrick solve problems for non-technical business users?",
    "Tell me about Kendrick's working style and personality",
  ];

  // ── Session counter ───────────────────────────────────────────────────────

  function updateSessionCounter() {
    sessionCounterEl.textContent = `// queries: ${turnCount} / ${SESSION_LIMIT}`;
    sessionCounterEl.className =
      turnCount >= SESSION_LIMIT ? 'limit' :
      turnCount >= SESSION_LIMIT - 1 ? 'warn' : '';
  }

  // ── Helpers ──────────────────────────────────────────────────────────────

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function createRow(role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av  = document.createElement('div');
    av.className = `avatar ${role}`;
    av.textContent = role === 'bot' ? '[K]' : '[you]';

    const bub = document.createElement('div');
    bub.className = `bubble ${role}`;

    row.appendChild(av);
    row.appendChild(bub);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bub;
  }

  function showThinking() {
    const bub = createRow('bot');
    bub.innerHTML = '<span class="thinking-label">processing</span><span class="thinking-cursor"></span>';
    return bub;
  }

  function setInputEnabled(enabled) {
    if (sessionEnded) return;
    inputEl.disabled = !enabled;
    sendBtn.disabled = !enabled;
    isStreaming = !enabled;
    if (enabled) inputEl.focus();
  }

  function lockSession() {
    sessionEnded = true;
    isStreaming  = false;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    counterEl.textContent = '';
    bannerEl.style.display = 'inline';
    updateSessionCounter();
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
  }

  // ── Prompt chips ─────────────────────────────────────────────────────────

  function showPromptChips() {
    const container = document.createElement('div');
    container.id = 'prompt-chips';
    PROMPTS.forEach(prompt => {
      const btn = document.createElement('button');
      btn.className = 'prompt-chip';
      btn.textContent = prompt;
      btn.addEventListener('click', () => {
        removePromptChips();
        inputEl.value = prompt;
        counterEl.textContent = `${prompt.length} / ${MAX_CHARS}`;
        autoResize();
        handleSend();
      });
      container.appendChild(btn);
    });
    messagesEl.appendChild(container);
    scrollToBottom();
  }

  function removePromptChips() {
    const el = document.getElementById('prompt-chips');
    if (el) el.remove();
  }

  // ── Clear session ─────────────────────────────────────────────────────────

  function clearSession() {
    if (isStreaming) return;
    history      = [];
    sessionEnded = false;
    isStreaming  = false;
    turnCount    = 0;
    messagesEl.innerHTML = '';
    bannerEl.style.display = 'none';
    inputEl.value = '';
    inputEl.placeholder = 'type a question…';
    counterEl.textContent = `0 / ${MAX_CHARS}`;
    counterEl.className  = '';
    autoResize();
    updateSessionCounter();
    setInputEnabled(true);
    const bub = createRow('bot');
    bub.textContent = "Hi — ask me anything about Kendrick's background.";
    showPromptChips();
  }

  clearBtn.addEventListener('click', clearSession);

  // ── Greeting on load ─────────────────────────────────────────────────────

  window.addEventListener('DOMContentLoaded', () => {
    const bub = createRow('bot');
    bub.textContent = "Hi — ask me anything about Kendrick's background.";
    showPromptChips();
    inputEl.focus();
  });

  // ── Input events ─────────────────────────────────────────────────────────

  inputEl.addEventListener('input', () => {
    autoResize();
    const len = inputEl.value.length;
    counterEl.textContent = `${len} / ${MAX_CHARS}`;
    counterEl.className = len >= MAX_CHARS ? 'limit' : len >= MAX_CHARS * 0.85 ? 'warn' : '';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) handleSend();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (!isStreaming) handleSend();
  });

  // ── Send ─────────────────────────────────────────────────────────────────

  async function handleSend() {
    if (sessionEnded) return;
    const text = inputEl.value.trim();
    if (!text) return;
    if (text.length > MAX_CHARS) return;

    removePromptChips();

    // Render user bubble
    const userBub = createRow('user');
    userBub.textContent = text;

    history.push({ role: 'user', content: text });
    inputEl.value = '';
    counterEl.textContent = `0 / ${MAX_CHARS}`;
    counterEl.className = '';
    autoResize();
    setInputEnabled(false);

    // Thinking indicator — reused as the bot response bubble
    const botBub = showThinking();

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      // Clear thinking dots — reuse this element for the reply
      botBub.innerHTML = '';

      if (response.status === 429) {
        botBub.classList.add('error');
        botBub.textContent = "// rate limit reached — please wait before sending more messages.";
        history.pop();
        setInputEnabled(true);
        return;
      }

      if (!response.ok) {
        let detail = '// something went wrong. please try again.';
        try {
          const err = await response.json();
          if (err.detail) detail = `// ${err.detail}`;
        } catch (_) {}
        botBub.classList.add('error');
        botBub.textContent = detail;
        history.pop();
        setInputEnabled(true);
        return;
      }

      // Stream SSE tokens directly into botBub
      let botText = '';

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';

      outer: while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break outer;

          try {
            const parsed = JSON.parse(payload);
            if (parsed.token) {
              botText += parsed.token;
              botBub.textContent = botText;
              scrollToBottom();
            } else if (parsed.session_limit) {
              lockSession();
            } else if (parsed.error) {
              botBub.classList.add('error');
              botBub.textContent = `// ${parsed.error}`;
              scrollToBottom();
              break outer;
            }
          } catch (_) {}
        }
      }

      if (botText) {
        history.push({ role: 'assistant', content: botText });
        turnCount++;
        updateSessionCounter();
      }

    } catch (_) {
      botBub.innerHTML = '';
      botBub.classList.add('error');
      botBub.textContent = '// connection error — check your network and try again.';
      history.pop();
    } finally {
      setInputEnabled(true);
    }
  }
</script>
</body>
</html>
